name: CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: gl-guardian-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8000/api/v1' }}

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ruff==0.8.6

      - name: Ruff correctness check
        run: python -m ruff check app tests --select E,F,W --ignore E501

      - name: Run backend tests
        run: python -m pytest

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.NEXT_PUBLIC_API_BASE_URL }}
        run: pnpm build

  docker:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name != 'pull_request'
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      ui_image: ${{ steps.images.outputs.ui_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: images
        run: |
          REPOSITORY_LC="${GITHUB_REPOSITORY,,}"
          echo "backend_image=${REGISTRY}/${REPOSITORY_LC}-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "ui_image=${REGISTRY}/${REPOSITORY_LC}-ui:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=${REGISTRY}/${REPOSITORY_LC}-backend:latest" >> "$GITHUB_OUTPUT"
          echo "ui_latest=${REGISTRY}/${REPOSITORY_LC}-ui:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: Backend
          file: Backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}
            ${{ steps.images.outputs.backend_latest }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: UI
          file: UI/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_API_TOKEN=${{ secrets.NEXT_PUBLIC_API_TOKEN }}
            NEXT_PUBLIC_API_USERNAME=${{ secrets.NEXT_PUBLIC_API_USERNAME }}
            NEXT_PUBLIC_API_PASSWORD=${{ secrets.NEXT_PUBLIC_API_PASSWORD }}
          tags: |
            ${{ steps.images.outputs.ui_image }}
            ${{ steps.images.outputs.ui_latest }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
        run: |
          test -n "$PROD_SSH_KEY"
          test -n "$PROD_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -p "$PROD_PORT" "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Copy production compose file
        env:
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH || '~/gl-guardian' }}
        run: |
          ssh -i ~/.ssh/prod_key -p "$PROD_PORT" "$PROD_USER@$PROD_HOST" "mkdir -p $PROD_DEPLOY_PATH"
          scp -i ~/.ssh/prod_key -P "$PROD_PORT" docker-compose.production.yml "$PROD_USER@$PROD_HOST:$PROD_DEPLOY_PATH/docker-compose.production.yml"

      - name: Pull images, migrate, and restart
        env:
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT || '22' }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH || '~/gl-guardian' }}
          GHCR_DEPLOY_USER: ${{ secrets.GHCR_DEPLOY_USER || github.actor }}
          GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          BACKEND_IMAGE: ${{ needs.docker.outputs.backend_image }}
          UI_IMAGE: ${{ needs.docker.outputs.ui_image }}
        run: |
          ssh -i ~/.ssh/prod_key -p "$PROD_PORT" "$PROD_USER@$PROD_HOST" \
            "cd $PROD_DEPLOY_PATH \
            && echo '$GHCR_DEPLOY_TOKEN' | docker login ghcr.io -u '$GHCR_DEPLOY_USER' --password-stdin \
            && BACKEND_IMAGE='$BACKEND_IMAGE' UI_IMAGE='$UI_IMAGE' docker compose --env-file .env.production -f docker-compose.production.yml pull \
            && BACKEND_IMAGE='$BACKEND_IMAGE' UI_IMAGE='$UI_IMAGE' docker compose --env-file .env.production -f docker-compose.production.yml run --rm migrate \
            && BACKEND_IMAGE='$BACKEND_IMAGE' UI_IMAGE='$UI_IMAGE' docker compose --env-file .env.production -f docker-compose.production.yml up -d --remove-orphans"
